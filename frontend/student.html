<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Student Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --primary: #4f46e5; --primary-hover: #4338ca;
      --bg: #f8fafc; --card-bg: rgba(255, 255, 255, 0.95);
      --text-main: #0f172a; --text-muted: #64748b;
      --border: #e2e8f0; --success: #10b981; --error: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; }
    
    .card { background: var(--card-bg); border-radius: 20px; padding: 40px 24px; max-width: 400px; width: 100%; box-shadow: 0 20px 40px rgba(0,0,0,0.2); text-align: center; animation: fadeIn 0.4s ease-out; }
    
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    p { color: var(--text-muted); font-size: 15px; margin-bottom: 32px; line-height: 1.5; }
    
    label { display: block; text-align: left; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }
    select, input { width: 100%; padding: 14px 16px; border: 2px solid var(--border); border-radius: 12px; font-size: 16px; font-weight: 500; margin-bottom: 24px; transition: all 0.2s; background: #fff; font-family: inherit; }
    select:focus, input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
    
    button { width: 100%; background: var(--primary); color: #fff; border: none; border-radius: 12px; padding: 16px; font-size: 17px; font-weight: 600; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2); }
    button:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 6px 16px rgba(79, 70, 229, 0.3); }
    button.logout { background: #cbd5e1; color: var(--text-main); margin-top: 20px; box-shadow: none; padding: 12px; font-size: 14px;}
    button.logout:hover { background: #94a3b8; transform: none; }
    
    #qr-container { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; margin-top: 10px; background: white; padding: 24px; border-radius: 16px; border: 2px dashed var(--border); }
    #student-qrcode canvas { border-radius: 10px; }
    
    .hidden { display: none !important; }
    
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>

<!-- Login Section -->
<div id="login-section" class="card">
  <div class="icon">🎓</div>
  <h1>Student Portal</h1>
  <p>Input your Enrollment Number and select the active session to view your QR Code.</p>

  <div style="text-align: left;">
    <label>Enrollment Number</label>
    <input id="enrollment-number" type="text" placeholder="e.g., 2410110302">
    
    <label>Current Session</label>
    <select id="session-select">
      <option value="">Loading sessions…</option>
    </select>
  </div>

  <button id="btn-login" onclick="login()">Generate Secure QR</button>
  <div id="msg" style="margin-top: 15px; color: var(--error); font-size: 14px; font-weight: 500;"></div>
</div>

<!-- Dashboard Section -->
<div id="dash-section" class="card hidden">
  <div class="icon">🏷️</div>
  <h1 id="welcome-msg">Welcome</h1>
  <p id="session-display" style="font-weight: 500; color: var(--primary); margin-bottom: 20px;"></p>
  <p id="attendance-stats" style="font-weight: 600; color: var(--success); margin-bottom: 20px;"></p>
  <p>Show this code to your teacher to get marked present. This QR is only valid for this session.</p>

  <div id="qr-container">
    <div id="student-qrcode"></div>
  </div>
  
  <button class="logout" onclick="logout()">Done / Back</button>
</div>

<script>
const API = window.location.origin;

async function loadSessions() {
  try {
    const res = await fetch(`${API}/sessions/active`);
    if (!res.ok) throw new Error('Failed to load sessions');
    const sessions = await res.json();
    const sel = document.getElementById('session-select');
    sel.innerHTML = '<option value="">— select current session —</option>' +
      sessions.map(s => `<option value="${s.id}" data-subject="${s.subject}">${s.subject}</option>`).join('');
  } catch(err) {
    document.getElementById('msg').textContent = 'Could not load sessions. Is backend running?';
  }
}

async function login() {
  const enrollmentNo = document.getElementById('enrollment-number').value.trim();
  const sel = document.getElementById('session-select');
  const examId = sel.value;
  const msgEl = document.getElementById('msg');
  msgEl.textContent = '';

  if (!enrollmentNo) return msgEl.textContent = 'Please enter your Enrollment Number.';
  if (!examId) return msgEl.textContent = 'Please select a session.';

  const btn = document.getElementById('btn-login');
  btn.disabled = true;
  btn.textContent = 'Verifying...';

  try {
    // Verify Enrollment No with backend
    const res = await fetch(`${API}/student/login/${enrollmentNo}`);
    const data = await res.json();
    
    if (!res.ok) {
      btn.disabled = false;
      btn.textContent = 'Generate Secure QR';
      return msgEl.textContent = data.error || 'Invalid Enrollment Number.';
    }

    // Success
    const sessionName = sel.options[sel.selectedIndex].getAttribute('data-subject');
    finishLogin(data.qr_code_text, data.name, sessionName, data.student_id);
    
  } catch(e) {
    msgEl.textContent = 'Network error verifying Roll Number.';
  }
  
  btn.disabled = false;
  btn.textContent = 'Generate Secure QR';
}

function finishLogin(qrCodeText, studentName, sessionName, studentId) {
  document.getElementById('welcome-msg').textContent = `Hi, ${studentName.split(' ')[0]}`;
  document.getElementById('session-display').textContent = sessionName;
  
  // Fetch Attendance Percentage (Scalar Function)
  fetch(`${API}/student/stats/${studentId}`)
    .then(res => res.json())
    .then(data => {
      document.getElementById('attendance-stats').textContent = `Your Overall Attendance: ${data.percentage || 0}%`;
    })
    .catch(e => console.log('Error fetching stats', e));
  
  document.getElementById('student-qrcode').innerHTML = '';
  // Encodes raw QR code text
  const payload = qrCodeText;
  
  new QRCode(document.getElementById('student-qrcode'), {
    text: payload,
    width: 200,
    height: 200,
    colorDark : "#0f172a",
    colorLight : "#ffffff",
    correctLevel : QRCode.CorrectLevel.H
  });

  document.getElementById('login-section').classList.add('hidden');
  document.getElementById('dash-section').classList.remove('hidden');
}

function logout() {
  document.getElementById('login-section').classList.remove('hidden');
  document.getElementById('dash-section').classList.add('hidden');
  document.getElementById('student-qrcode').innerHTML = '';
}

loadSessions();
</script>
</body>
</html>
