version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: qr_attendance_mysql
    environment:
      MYSQL_ROOT_PASSWORD: shree9528
      MYSQL_DATABASE: qr_attendance_db
    ports:
      - "3307:3306"
    volumes:
      - ./database/schema.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
